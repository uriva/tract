<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Two paths diverge then converge — the core Tract concept -->
  <!-- Left branch -->
  <path d="M16 4 L10 12 L10 20 L16 28" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right branch -->
  <path d="M16 4 L22 12 L22 20 L16 28" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Commit dots -->
  <circle cx="16" cy="4" r="2.5" fill="#475569"/>
  <circle cx="10" cy="12" r="2.5" fill="#475569"/>
  <circle cx="22" cy="12" r="2.5" fill="#475569"/>
  <circle cx="10" cy="20" r="2.5" fill="#475569"/>
  <circle cx="22" cy="20" r="2.5" fill="#475569"/>
  <circle cx="16" cy="28" r="2.5" fill="#475569"/>
</svg>
